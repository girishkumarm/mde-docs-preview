<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Market Data Engine — Docs Preview</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css">
<style>
  :root { --sidebar: 280px; --bg: #ffffff; --fg: #1f2328; --muted: #656d76; --accent:#0D9373; --border:#d1d9e0; --sidebar-bg:#f6f8fa; }
  * { box-sizing: border-box; }
  html, body { color: #1f2328 !important; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:#1f2328; }
  /* Override github-markdown-css washout — use dark, consistent colors */
  .markdown-body { color: #1f2328 !important; background: transparent !important; font-size: 15px; line-height: 1.6; }
  .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 { color: #1f2328 !important; border-bottom-color: var(--border) !important; }
  .markdown-body p, .markdown-body li, .markdown-body td, .markdown-body th { color: #1f2328 !important; }
  .markdown-body a { color: #0969da !important; }
  .markdown-body code { color: #1f2328 !important; background-color: rgba(175,184,193,.2) !important; }
  .markdown-body blockquote { color: #656d76 !important; border-left-color: #d1d9e0 !important; }
  .markdown-body table tr { background-color: #fff !important; }
  .markdown-body table tr:nth-child(2n) { background-color: #f6f8fa !important; }
  .markdown-body hr { background-color: var(--border) !important; }
  header { position:fixed; top:0; left:0; right:0; height:52px; background:var(--accent); color:white; padding:0 20px; display:flex; align-items:center; justify-content:space-between; z-index:100; box-shadow:0 1px 3px rgba(0,0,0,.1); }
  header h1 { margin:0; font-size:16px; font-weight:600; }
  header .meta { font-size:12px; opacity:.85; }
  nav { position:fixed; top:52px; left:0; width:var(--sidebar); bottom:0; background:var(--sidebar-bg); border-right:1px solid var(--border); overflow-y:auto; padding:20px 0; }
  nav .group { margin-bottom:20px; }
  nav .group-title { padding:4px 20px; font-size:11px; font-weight:700; text-transform:uppercase; color:var(--muted); letter-spacing:.5px; }
  nav a { display:block; padding:6px 20px; color:var(--fg); text-decoration:none; font-size:14px; border-left:3px solid transparent; }
  nav a:hover { background:#eaeef2; }
  nav a.active { background:white; border-left-color:var(--accent); color:var(--accent); font-weight:600; }
  main { margin-left:var(--sidebar); margin-top:52px; padding:40px 60px; max-width:900px; }
  .markdown-body { background:transparent; }
  .markdown-body h1:first-child { margin-top:0; }
  .callout { border-left:4px solid var(--accent); background:#e8f5f0; padding:12px 16px; margin:16px 0; border-radius:4px; }
  .callout.warning { border-color:#d1242f; background:#ffebe9; }
  .callout.note { border-color:#0969da; background:#ddf4ff; }
  .callout-label { font-weight:700; font-size:12px; text-transform:uppercase; margin-bottom:4px; opacity:.7; }
  pre.mermaid { background:#f6f8fa; padding:12px; border-radius:6px; overflow-x:auto; }
  .mermaid-error { color:#d1242f; padding:12px; background:#ffebe9; border-radius:4px; font-family:monospace; font-size:12px; }
  #content img { max-width:100%; height:auto; }
  .loading { color:var(--muted); padding:40px; text-align:center; }
  .accordion { border:1px solid var(--border); border-radius:6px; margin:8px 0; padding:12px; }
  .accordion summary { cursor:pointer; font-weight:600; }
  .accordion-content { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
  .tabs { border:1px solid var(--border); border-radius:6px; margin:12px 0; }
  .tabs-nav { display:flex; border-bottom:1px solid var(--border); }
  .tabs-nav button { background:none; border:none; padding:10px 16px; cursor:pointer; font-size:14px; color:var(--muted); border-bottom:2px solid transparent; }
  .tabs-nav button.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
  .tabs-panel { padding:16px; display:none; }
  .tabs-panel.active { display:block; }
  .cards { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:12px 0; }
  .card { border:1px solid var(--border); border-radius:6px; padding:16px; }
  .card-title { font-weight:600; margin-bottom:6px; }
  .card a { color:var(--accent); }
  .steps { counter-reset:step; margin:12px 0; }
  .step { counter-increment:step; padding:12px 16px 12px 50px; position:relative; border-left:2px solid var(--border); margin-left:20px; }
  .step::before { content:counter(step); position:absolute; left:-16px; top:10px; width:32px; height:32px; border-radius:50%; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; }
  .step-title { font-weight:600; margin-bottom:4px; }
</style>
</head>
<body>
<header>
  <h1>📈 Market Data Engine — Documentation</h1>
  <div class="meta">Local preview · pre-production draft</div>
</header>
<nav id="nav"></nav>
<main><div id="content" class="markdown-body"><div class="loading">Select a page from the sidebar…</div></div></main>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📈%3C/text%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
mermaid.initialize({ startOnLoad:false, theme:'default', securityLevel:'loose' });
window.__mermaid = mermaid;
</script>
<script>
// Auto-id on every heading so #anchors work
marked.use({
  renderer: {
    heading(text, level, raw) {
      const slug = (raw || text).toLowerCase().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-');
      return `<h${level} id="${slug}">${text}</h${level}>\n`;
    }
  }
});
const NAV = [
  { title: "Introduction", pages: [
    ["Introduction", "../introduction.mdx"],
    ["Architecture Overview", "../architecture/overview.mdx"],
    ["Service Catalog", "../architecture/service-catalog.mdx"]
  ]},
  { title: "Architecture", pages: [
    ["Architecture Diagrams", "../architecture/diagrams.mdx"],
    ["Kafka vs Redis (ADR)", "../decisions/kafka-vs-redis.mdx"]
  ]},
  { title: "Components", pages: [
    ["Part 1: Feed → Charts", "../components/part1-feed-to-charts.mdx"],
    ["Part 2: FNO, Movers, Alerts", "../components/part2-fno-movers-alerts.mdx"],
    ["Candles v2 (current)", "../components/candles-v2.mdx"],
    ["Candles v2 Diagrams", "../components/candles-v2-diagrams.mdx"]
  ]},
  { title: "Data & APIs", pages: [
    ["Data Models & APIs", "../data-apis/data-models-and-apis.mdx"],
    ["Kafka Topics", "../data-apis/kafka-topics.mdx"],
    ["Redis Keys", "../data-apis/redis-keys.mdx"]
  ]},
  { title: "Operations", pages: [
    ["DevOps Guide", "../operations/devops-guide.mdx"],
    ["v2 Production Readiness", "../operations/v2-production-readiness.mdx"],
    ["v2 Oncall Runbook", "../operations/v2-oncall-runbook.mdx"],
    ["Candles v2 Readiness", "../operations/candles-v2-readiness.mdx"],
    ["Candles v2 Canary & Rollback", "../operations/candles-v2-canary-rollback.mdx"]
  ]},
  { title: "Migration", pages: [
    ["Overview", "../migration/overview.mdx"],
    ["Price Engine (detailed)", "../migration/price-engine.mdx"]
  ]}
];

// Build sidebar
const nav = document.getElementById('nav');
NAV.forEach(g => {
  const div = document.createElement('div');
  div.className = 'group';
  div.innerHTML = `<div class="group-title">${g.title}</div>`;
  g.pages.forEach(([label, path]) => {
    const a = document.createElement('a');
    a.textContent = label;
    a.href = '#' + encodeURIComponent(path);
    a.dataset.path = path;
    div.appendChild(a);
  });
  nav.appendChild(div);
});

// MDX → HTML: strip frontmatter, convert components to plain HTML divs
function mdxToHtml(mdx) {
  // Extract + strip frontmatter
  let title = '', description = '';
  const fm = mdx.match(/^---\n([\s\S]*?)\n---\n/);
  if (fm) {
    const titleM = fm[1].match(/^title:\s*["']?([^"'\n]+)["']?$/m);
    const descM = fm[1].match(/^description:\s*["']?([^"'\n]+)["']?$/m);
    if (titleM) title = titleM[1].trim().replace(/["']$/, '');
    if (descM) description = descM[1].trim().replace(/["']$/, '');
    mdx = mdx.slice(fm[0].length);
  }
  // Prepend title only if body doesn't have ANY h1 (# Heading at start of line)
  // Strip fenced code blocks + inline code first so bash comments (# foo) don't false-match
  const stripped = mdx.replace(/```[\s\S]*?```/g, '').replace(/`[^`\n]+`/g, '');
  const bodyHasH1 = /(^|\n)\s*#\s+[^\n#]/.test(stripped);
  let header = '';
  if (title && !bodyHasH1) header += `# ${title}\n\n`;
  if (description) header += `> ${description}\n\n`;
  mdx = header + mdx;
  // Rewrite internal links EARLY (before any marked.parse inside components)
  mdx = mdx.replace(/\]\((\/[^)#\s]+?)(#[^)\s]*)?\)/g, (m, path, anchor) => {
    if (path.startsWith('/images/')) return m;
    if (path.match(/\.(png|jpg|jpeg|svg|gif|webp|pdf|mdx|md|html|excalidraw)$/i)) return m;
    const clean = path.replace(/\/$/, '');
    const hash = '#' + encodeURIComponent('..' + clean + '.mdx') + (anchor || '');
    return `](${hash})`;
  });
  // Convert <Info>, <Warning>, <Note> to callouts
  mdx = mdx.replace(/<Info>([\s\S]*?)<\/Info>/g, (_, b) => `<div class="callout"><div class="callout-label">ℹ️ Info</div>${marked.parse(b.trim())}</div>`);
  mdx = mdx.replace(/<Warning>([\s\S]*?)<\/Warning>/g, (_, b) => `<div class="callout warning"><div class="callout-label">⚠️ Warning</div>${marked.parse(b.trim())}</div>`);
  mdx = mdx.replace(/<Note>([\s\S]*?)<\/Note>/g, (_, b) => `<div class="callout note"><div class="callout-label">📝 Note</div>${marked.parse(b.trim())}</div>`);
  mdx = mdx.replace(/<Accordion title="([^"]+)">([\s\S]*?)<\/Accordion>/g, (_, t, b) => `<details class="accordion"><summary>${t}</summary><div class="accordion-content">${marked.parse(b.trim())}</div></details>`);
  // CardGroup / Card
  mdx = mdx.replace(/<CardGroup[^>]*>([\s\S]*?)<\/CardGroup>/g, (_, b) => `<div class="cards">${b}</div>`);
  mdx = mdx.replace(/<Card title="([^"]+)"([^>]*)>([\s\S]*?)<\/Card>/g, (_, t, attrs, b) => {
    const hrefM = attrs.match(/href="([^"]+)"/);
    let href = hrefM ? hrefM[1] : '';
    if (href && !href.startsWith('http') && !href.startsWith('#')) {
      href = '#' + encodeURIComponent('..' + href + '.mdx');
    }
    return `<div class="card"><div class="card-title">${href ? `<a href="${href}">${t}</a>` : t}</div>${marked.parse(b.trim())}</div>`;
  });
  // Steps
  mdx = mdx.replace(/<Steps>([\s\S]*?)<\/Steps>/g, (_, b) => `<div class="steps">${b}</div>`);
  mdx = mdx.replace(/<Step title="([^"]+)">([\s\S]*?)<\/Step>/g, (_, t, b) => `<div class="step"><div class="step-title">${t}</div>${marked.parse(b.trim())}</div>`);
  // Tabs
  let tabCounter = 0;
  mdx = mdx.replace(/<Tabs>([\s\S]*?)<\/Tabs>/g, (_, b) => {
    const id = 'tabs-' + (tabCounter++);
    const tabs = [...b.matchAll(/<Tab title="([^"]+)">([\s\S]*?)<\/Tab>/g)];
    const navH = tabs.map((t,i) => `<button class="${i===0?'active':''}" onclick="switchTab('${id}',${i})">${t[1]}</button>`).join('');
    const panelsH = tabs.map((t,i) => `<div class="tabs-panel ${i===0?'active':''}" data-i="${i}">${marked.parse(t[2].trim())}</div>`).join('');
    return `<div class="tabs" data-id="${id}"><div class="tabs-nav">${navH}</div>${panelsH}</div>`;
  });
  // Transform /images/ paths to served path
  mdx = mdx.replace(/\]\(\/images\//g, '](../images/');
  // Rewrite Mintlify-style internal links: `](/path#anchor)` → `](#..%2Fpath.mdx#anchor)`
  // These are absolute paths that aren't /images/ and don't have an extension
  mdx = mdx.replace(/\]\((\/[^)#\s]+?)(#[^)\s]*)?\)/g, (m, path, anchor) => {
    if (path.startsWith('/images/')) return m; // already handled above
    if (path.match(/\.(png|jpg|jpeg|svg|gif|webp|pdf|mdx|md|html)$/i)) return m;
    // Strip trailing slash, add .mdx
    const clean = path.replace(/\/$/, '');
    const hash = '#' + encodeURIComponent('..' + clean + '.mdx') + (anchor || '');
    return `](${hash})`;
  });
  return marked.parse(mdx);
}

window.switchTab = function(id, idx) {
  const wrap = document.querySelector(`[data-id="${id}"]`);
  wrap.querySelectorAll('.tabs-nav button').forEach((b,i) => b.classList.toggle('active', i===idx));
  wrap.querySelectorAll('.tabs-panel').forEach(p => p.classList.toggle('active', Number(p.dataset.i)===idx));
};

async function loadPage(path) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const res = await fetch(path);
    if (!res.ok) throw new Error(res.status);
    const mdx = await res.text();
    content.innerHTML = mdxToHtml(mdx);
    // Highlight code
    content.querySelectorAll('pre code').forEach(b => {
      if (b.className.includes('language-mermaid')) {
        const pre = b.parentElement;
        pre.className = 'mermaid';
        pre.innerHTML = b.textContent;
      } else {
        hljs.highlightElement(b);
      }
    });
    // Render mermaid
    if (window.__mermaid) {
      try { await window.__mermaid.run({ querySelector: '.mermaid' }); }
      catch(e) { console.error(e); }
    }
    // Active link
    document.querySelectorAll('nav a').forEach(a => a.classList.toggle('active', a.dataset.path === path));
    // Hashchange for internal markdown links
    content.querySelectorAll('a[href^="../"]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const href = a.getAttribute('href');
        location.hash = encodeURIComponent(href);
      });
    });
    window.scrollTo(0,0);
  } catch (e) {
    content.innerHTML = `<div class="callout warning"><div class="callout-label">Error</div><pre>${e.message}\n${path}</pre></div>`;
  }
}

let currentPage = null;
async function fromHash() {
  const raw = location.hash.slice(1);
  if (!raw) { currentPage = '../introduction.mdx'; return loadPage(currentPage); }
  const h = decodeURIComponent(raw);
  // If hash starts with a page path (../), it's a page (optionally + #anchor)
  if (h.startsWith('../')) {
    // Could be "../path.mdx" or "../path.mdx#anchor"
    const hashIdx = h.indexOf('.mdx#');
    if (hashIdx >= 0) {
      const pagePath = h.slice(0, hashIdx + 4);
      const anchor = h.slice(hashIdx + 5);
      if (currentPage !== pagePath) {
        currentPage = pagePath;
        await loadPage(pagePath);
      }
      scrollToAnchor(anchor);
    } else {
      currentPage = h;
      await loadPage(h);
    }
  } else {
    // Bare anchor on current page
    scrollToAnchor(h);
  }
}

function scrollToAnchor(id) {
  if (!id) return;
  // Match by id attribute OR by text-slug of a heading (marked auto-generates slugs)
  let el = document.getElementById(id);
  if (!el) {
    const slug = id.toLowerCase();
    el = [...document.querySelectorAll('#content h1, #content h2, #content h3, #content h4, #content h5, #content h6, #content a[id]')]
      .find(h => {
        if (h.id === slug) return true;
        const text = h.textContent.toLowerCase().trim();
        const auto = text.replace(/[^\w\s-]/g,'').replace(/\s+/g,'-');
        return auto === slug;
      });
  }
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

window.addEventListener('hashchange', fromHash);
fromHash();
</script>
</body>
</html>
