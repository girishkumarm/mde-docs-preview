<text x="643.5" y="54.0" font-size="20" fill="#ffffff" font-weight="600" xml:space="preserve">Resilience Overview — Never Break Architecture</text>
<text x="590.0" y="74.0" font-size="13" fill="#e7f5ff" font-weight="400" xml:space="preserve">Every component has redundancy + fallback. No single failure takes down the platform.</text>
<text x="541.5" y="150.0" font-size="16" fill="#212529" font-weight="600" xml:space="preserve">RESILIENCE MATRIX PER COMPONENT</text>
<text x="90.0" y="188.0" font-size="13" fill="#212529" font-weight="400" xml:space="preserve">Component</text>
<text x="315.0" y="188.0" font-size="13" fill="#212529" font-weight="400" xml:space="preserve">Primary</text>
<text x="556.5" y="188.0" font-size="13" fill="#212529" font-weight="400" xml:space="preserve">Secondary</text>
<text x="840.0" y="188.0" font-size="13" fill="#212529" font-weight="400" xml:space="preserve">Tertiary</text>
<text x="1088.5" y="188.0" font-size="13" fill="#212529" font-weight="400" xml:space="preserve">Incident Manager Response</text>
<text x="78.5" y="230.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Exchange Feed</text>
<text x="306.5" y="230.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">NSE Direct</text>
<text x="562.5" y="230.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Omnenest</text>
<text x="800.5" y="230.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Stale Redis snapshot</text>
<text x="1095.5" y="230.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Alert + feed source merge</text>
<text x="82.0" y="270.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Feed Handler</text>
<text x="296.0" y="270.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">3 pods active</text>
<text x="534.5" y="270.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">K8s auto-restart</text>
<text x="800.5" y="270.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Kafka replays missed</text>
<text x="1102.5" y="270.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Auto-restart failed pod</text>
<text x="106.5" y="310.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Kafka</text>
<text x="310.0" y="310.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">3 brokers</text>
<text x="520.5" y="310.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">acks=all replication</text>
<text x="811.0" y="310.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Local ring buffer</text>
<text x="1127.0" y="310.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Alert + scale up</text>
<text x="71.5" y="350.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Redis Cluster 1</text>
<text x="271.5" y="350.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Primary + 2 replicas</text>
<text x="520.5" y="350.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Auto-failover 15-30s</text>
<text x="790.0" y="350.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Kafka replay on recover</text>
<text x="1102.5" y="350.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Alert + circuit breaker</text>
<text x="71.5" y="390.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Redis Cluster 2</text>
<text x="271.5" y="390.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Primary + 2 replicas</text>
<text x="545.0" y="390.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Auto-failover</text>
<text x="783.0" y="390.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">APIs use Layer 2 fallback</text>
<text x="1089.0" y="390.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Alert + silent feature flag</text>
<text x="85.5" y="430.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">TimescaleDB</text>
<text x="282.0" y="430.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Primary + replica</text>
<text x="555.5" y="430.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">WAL replay</text>
<text x="814.5" y="430.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Recent snapshots</text>
<text x="1082.0" y="430.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Alert + read-replica failover</text>
<text x="57.5" y="470.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">WebSocket Broadcast</text>
<text x="313.5" y="470.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">20+ pods</text>
<text x="527.5" y="470.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">K8s rolling deploy</text>
<text x="797.0" y="470.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Client auto-reconnect</text>
<text x="1102.5" y="470.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Circuit breaker + scale</text>
<text x="50.5" y="510.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">APIs (Charts/FNO/...)</text>
<text x="303.0" y="510.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Cache-first</text>
<text x="513.5" y="510.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Stale-while-revalidate</text>
<text x="821.5" y="510.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Empty state UI</text>
<text x="1120.0" y="510.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Silent degradation</text>
<text x="1544.0" y="149.0" font-size="16" fill="#ffffff" font-weight="600" xml:space="preserve">PRINCIPLES</text>
<text x="1396" y="192.0" font-size="14" fill="#212529" font-weight="400" xml:space="preserve">1. Every read has a fallback</text>
<text x="1396" y="244.0" font-size="14" fill="#212529" font-weight="400" xml:space="preserve">2. Every write has a buffer</text>
<text x="1396" y="296.0" font-size="14" fill="#212529" font-weight="400" xml:space="preserve">3. Every service has health checks</text>
<text x="1396" y="348.0" font-size="14" fill="#212529" font-weight="400" xml:space="preserve">4. Every failure has auto-remediation</text>
<text x="1396" y="400.0" font-size="14" fill="#212529" font-weight="400" xml:space="preserve">5. Every incident is LLM-analyzed</text>
<text x="701.5" y="576.0" font-size="16" fill="#ffffff" font-weight="600" xml:space="preserve">CHAOS ENGINEERING — Proactive Failure Testing</text>
<text x="186.0" y="621.0" font-size="13" fill="#7a2907" font-weight="400" xml:space="preserve">Monthly Game Days</text>
<text x="100.5" y="645.0" font-size="11" fill="#1e1e1e" font-weight="400" xml:space="preserve">Team runs scripted failure scenarios in staging</text>
<text x="622.5" y="621.0" font-size="13" fill="#7a2907" font-weight="400" xml:space="preserve">Service Kill Tests</text>
<text x="562.5" y="639.0" font-size="11" fill="#1e1e1e" font-weight="400" xml:space="preserve">Randomly kill pods (Feed Handler, Redis,</text>
<text x="582.0" y="653.0" font-size="11" fill="#1e1e1e" font-weight="400" xml:space="preserve">Kafka) during trading hours in dev</text>
<text x="1073.5" y="621.0" font-size="13" fill="#7a2907" font-weight="400" xml:space="preserve">Failover Drills</text>
<text x="942.0" y="645.0" font-size="11" fill="#1e1e1e" font-weight="400" xml:space="preserve">Force Redis primary failure quarterly; measure recovery SLA</text>
<text x="1491.0" y="621.0" font-size="13" fill="#7a2907" font-weight="400" xml:space="preserve">Region Evacuation Sim</text>
<text x="1369.5" y="645.0" font-size="11" fill="#1e1e1e" font-weight="400" xml:space="preserve">Simulate AZ outage annually — verify cross-AZ replica promotion</text>
