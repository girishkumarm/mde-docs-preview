<text x="200" y="44.0" font-size="24" fill="#1e1e1e" font-weight="500">Decision 5: Expiry Day Cleanup (Thursday)</text>
<text x="200" y="67.0" font-size="12" fill="#c92a2a" font-weight="500">Problem: Expired contracts served as live data for 2.5 hours after market close (until 6 PM daily sync).</text>
<text x="50" y="118.0" font-size="18" fill="#c92a2a" font-weight="500">BEFORE — Thursday Timeline</text>
<text x="66" y="165.0" font-size="11" fill="#e67700" font-weight="500">2:00-3:00 PM</text>
<text x="66" y="178.75" font-size="11" fill="#e67700" font-weight="500"></text>
<text x="66" y="192.5" font-size="11" fill="#e67700" font-weight="500">Traders rolling /</text>
<text x="66" y="206.25" font-size="11" fill="#e67700" font-weight="500">closing positions</text>
<text x="336" y="165.0" font-size="11" fill="#c92a2a" font-weight="500">3:00-3:30 PM</text>
<text x="336" y="178.75" font-size="11" fill="#c92a2a" font-weight="500"></text>
<text x="336" y="192.5" font-size="11" fill="#c92a2a" font-weight="500">OI drops to zero</text>
<text x="336" y="206.25" font-size="11" fill="#c92a2a" font-weight="500">across 100s of strikes</text>
<text x="606" y="165.0" font-size="11" fill="#c92a2a" font-weight="500">3:30 PM</text>
<text x="606" y="178.75" font-size="11" fill="#c92a2a" font-weight="500"></text>
<text x="606" y="192.5" font-size="11" fill="#c92a2a" font-weight="500">Market CLOSES</text>
<text x="606" y="206.25" font-size="11" fill="#c92a2a" font-weight="500">Weekly expiry done</text>
<text x="876" y="165.0" font-size="11" fill="#c92a2a" font-weight="500">3:30-6:00 PM (2.5 hrs!)</text>
<text x="876" y="178.75" font-size="11" fill="#c92a2a" font-weight="500"></text>
<text x="876" y="192.5" font-size="11" fill="#c92a2a" font-weight="500">Expired contracts</text>
<text x="876" y="206.25" font-size="11" fill="#c92a2a" font-weight="500">STILL SHOWN AS LIVE</text>
<text x="876" y="220.0" font-size="11" fill="#c92a2a" font-weight="500">PCR/Max Pain meaningless</text>
<text x="1146" y="165.0" font-size="11" fill="#2f9e44" font-weight="500">6:00 PM</text>
<text x="1146" y="178.75" font-size="11" fill="#2f9e44" font-weight="500"></text>
<text x="1146" y="192.5" font-size="11" fill="#2f9e44" font-weight="500">Daily sync finally</text>
<text x="1146" y="206.25" font-size="11" fill="#2f9e44" font-weight="500">marks them inactive</text>
<text x="50" y="288.0" font-size="18" fill="#2f9e44" font-weight="500">AFTER — With ExpiryCleanupWorkflow</text>
<text x="586" y="324.0" font-size="12" fill="#c92a2a" font-weight="500">3:30 PM</text>
<text x="586" y="339.0" font-size="12" fill="#c92a2a" font-weight="500">Market CLOSES</text>
<text x="846" y="324.0" font-size="12" fill="#2f9e44" font-weight="500">3:30-3:31 PM</text>
<text x="846" y="339.0" font-size="12" fill="#2f9e44" font-weight="500">ExpiryCleanupWorkflow</text>
<text x="846" y="354.0" font-size="12" fill="#2f9e44" font-weight="500">(&lt; 30 seconds)</text>
<text x="1176" y="324.0" font-size="12" fill="#2f9e44" font-weight="500">3:31 PM onward</text>
<text x="1176" y="339.0" font-size="12" fill="#2f9e44" font-weight="500">Only next week's</text>
<text x="1176" y="354.0" font-size="12" fill="#2f9e44" font-weight="500">contracts shown</text>
<text x="50" y="436.0" font-size="16" fill="#7048e8" font-weight="500">ExpiryCleanupWorkflow (Temporal — 5 sequential steps, &lt; 30 sec total)</text>
<text x="66" y="480.0" font-size="11" fill="#7048e8" font-weight="500">STEP 1</text>
<text x="66" y="493.75" font-size="11" fill="#7048e8" font-weight="500">Identify expiring</text>
<text x="66" y="507.5" font-size="11" fill="#7048e8" font-weight="500">contracts in</text>
<text x="66" y="521.25" font-size="11" fill="#7048e8" font-weight="500">PostgreSQL</text>
<text x="341" y="480.0" font-size="11" fill="#7048e8" font-weight="500">STEP 2</text>
<text x="341" y="493.75" font-size="11" fill="#7048e8" font-weight="500">Mark EXPIRED</text>
<text x="341" y="507.5" font-size="11" fill="#7048e8" font-weight="500">status in</text>
<text x="341" y="521.25" font-size="11" fill="#7048e8" font-weight="500">PostgreSQL</text>
<text x="616" y="480.0" font-size="11" fill="#7048e8" font-weight="500">STEP 3</text>
<text x="616" y="493.75" font-size="11" fill="#7048e8" font-weight="500">Clean Redis</text>
<text x="616" y="507.5" font-size="11" fill="#7048e8" font-weight="500">Cluster 2</text>
<text x="616" y="521.25" font-size="11" fill="#7048e8" font-weight="500">(option chain,</text>
<text x="616" y="535.0" font-size="11" fill="#7048e8" font-weight="500">movers, insights)</text>
<text x="891" y="480.0" font-size="11" fill="#7048e8" font-weight="500">STEP 4</text>
<text x="891" y="493.75" font-size="11" fill="#7048e8" font-weight="500">Recalculate</text>
<text x="891" y="507.5" font-size="11" fill="#7048e8" font-weight="500">PCR / Max Pain</text>
<text x="891" y="521.25" font-size="11" fill="#7048e8" font-weight="500">using only LIVE</text>
<text x="891" y="535.0" font-size="11" fill="#7048e8" font-weight="500">contracts</text>
<text x="1166" y="480.0" font-size="11" fill="#7048e8" font-weight="500">STEP 5</text>
<text x="1166" y="493.75" font-size="11" fill="#7048e8" font-weight="500">Publish settlement</text>
<text x="1166" y="507.5" font-size="11" fill="#7048e8" font-weight="500">prices to Kafka</text>
<text x="1166" y="521.25" font-size="11" fill="#7048e8" font-weight="500">→ Portfolio Engine</text>
<text x="1166" y="535.0" font-size="11" fill="#7048e8" font-weight="500">→ Ledger Engine</text>
<text x="66" y="603.0" font-size="12" fill="#f08c00" font-weight="500">Applies to ALL expiry events:</text>
<text x="66" y="618.0" font-size="12" fill="#f08c00" font-weight="500">Weekly NIFTY / BANKNIFTY / FINNIFTY options  •  Monthly stock options  •  Monthly futures  •  Quarterly futures</text>
<text x="66" y="633.0" font-size="12" fill="#f08c00" font-weight="500"></text>
<text x="66" y="648.0" font-size="12" fill="#f08c00" font-weight="500">Triggered by market status change (CLOSE), NOT by daily 6 PM sync.  Runs in parallel with other post-close jobs.</text>
