<text x="150" y="44.0" font-size="24" fill="#1e1e1e" font-weight="500">Decision 1: Replace Redis PubSub with Kafka Pull</text>
<text x="150" y="67.0" font-size="12" fill="#c92a2a" font-weight="500">Problem: Redis PubSub is single-threaded. Fan-out to 20+ pods at high TPS saturates the CPU.</text>
<text x="150" y="118.0" font-size="18" fill="#c92a2a" font-weight="500">BEFORE — Redis PubSub (Push)</text>
<text x="900" y="118.0" font-size="18" fill="#2f9e44" font-weight="500">AFTER — Kafka (Pull)</text>
<text x="246" y="164.0" font-size="12" fill="#7048e8" font-weight="500">Feed Handler</text>
<text x="246" y="179.0" font-size="12" fill="#7048e8" font-weight="500">processes ticks</text>
<text x="946" y="164.0" font-size="12" fill="#7048e8" font-weight="500">Feed Handler</text>
<text x="946" y="179.0" font-size="12" fill="#7048e8" font-weight="500">processes ticks</text>
<text x="186" y="247.0" font-size="11" fill="#1971c2" font-weight="500">Publisher  writes to Redis</text>
<text x="186" y="260.75" font-size="11" fill="#1971c2" font-weight="500">Hash + PubSub PUSH</text>
<text x="186" y="274.5" font-size="11" fill="#1971c2" font-weight="500">(same connection)</text>
<text x="816" y="247.0" font-size="11" fill="#1971c2" font-weight="500">Publisher</text>
<text x="816" y="260.75" font-size="11" fill="#1971c2" font-weight="500">→ Redis Hash</text>
<text x="816" y="274.5" font-size="11" fill="#1971c2" font-weight="500">(snapshot only)</text>
<text x="1086" y="247.0" font-size="11" fill="#2f9e44" font-weight="500">Producer</text>
<text x="1086" y="260.75" font-size="11" fill="#2f9e44" font-weight="500">→ Kafka</text>
<text x="1086" y="274.5" font-size="11" fill="#2f9e44" font-weight="500">(acks=all)</text>
<text x="146" y="345.0" font-size="11" fill="#c92a2a" font-weight="500">Redis (SINGLE THREAD)</text>
<text x="146" y="358.75" font-size="11" fill="#c92a2a" font-weight="500"></text>
<text x="146" y="372.5" font-size="11" fill="#c92a2a" font-weight="500">On every publish, must COPY message</text>
<text x="146" y="386.25" font-size="11" fill="#c92a2a" font-weight="500">to each subscriber pod's buffer</text>
<text x="146" y="400.0" font-size="11" fill="#c92a2a" font-weight="500">20K msgs/sec × 20 pods = 400K ops/sec</text>
<text x="986" y="345.0" font-size="11" fill="#2f9e44" font-weight="500">Kafka (multi-partition)</text>
<text x="986" y="358.75" font-size="11" fill="#2f9e44" font-weight="500"></text>
<text x="986" y="372.5" font-size="11" fill="#2f9e44" font-weight="500">Writes ONCE to disk per message</text>
<text x="986" y="386.25" font-size="11" fill="#2f9e44" font-weight="500">Each pod PULLS at its own pace</text>
<text x="986" y="400.0" font-size="11" fill="#2f9e44" font-weight="500">10 pods or 100 pods = same Kafka load</text>
<text x="116" y="501.0" font-size="10" fill="#e8590c" font-weight="500">Pod 1</text>
<text x="216" y="501.0" font-size="10" fill="#e8590c" font-weight="500">Pod 2</text>
<text x="316" y="501.0" font-size="10" fill="#e8590c" font-weight="500">Pod 3</text>
<text x="416" y="501.0" font-size="10" fill="#e8590c" font-weight="500">Pod 4</text>
<text x="516" y="501.0" font-size="10" fill="#e8590c" font-weight="500">Pod 20</text>
<text x="846" y="501.0" font-size="10" fill="#2f9e44" font-weight="500">Pod 1</text>
<text x="966" y="501.0" font-size="10" fill="#2f9e44" font-weight="500">Pod 2</text>
<text x="1086" y="501.0" font-size="10" fill="#2f9e44" font-weight="500">Pod 3</text>
<text x="1206" y="501.0" font-size="10" fill="#2f9e44" font-weight="500">Pod 4</text>
<text x="1326" y="501.0" font-size="10" fill="#2f9e44" font-weight="500">Pod 20</text>
<text x="80" y="544.0" font-size="11" fill="#c92a2a" font-weight="500">At 100K concurrent connections:</text>
<text x="80" y="557.75" font-size="11" fill="#c92a2a" font-weight="500">→ Redis single thread hits 100% CPU</text>
<text x="80" y="571.5" font-size="11" fill="#c92a2a" font-weight="500">→ Publish latency climbs from &lt;1ms to 50-100ms</text>
<text x="80" y="585.25" font-size="11" fill="#c92a2a" font-weight="500">→ Users see frozen / delayed prices</text>
<text x="780" y="544.0" font-size="11" fill="#2f9e44" font-weight="500">At 100K or 1M concurrent connections:</text>
<text x="780" y="557.75" font-size="11" fill="#2f9e44" font-weight="500">→ Kafka just writes ONCE per tick</text>
<text x="780" y="571.5" font-size="11" fill="#2f9e44" font-weight="500">→ Each pod's consumer pulls independently</text>
<text x="780" y="585.25" font-size="11" fill="#2f9e44" font-weight="500">→ Horizontal scale is unlimited</text>
<text x="66" y="651.0" font-size="12" fill="#f08c00" font-weight="500">TRADEOFF:  PubSub push was &lt;1 ms delivery.  Kafka pull is 2-5 ms delivery.</text>
<text x="66" y="666.0" font-size="12" fill="#f08c00" font-weight="500">Human reaction time = 200 ms, so the 1-4 ms difference is invisible to every user.</text>
<text x="66" y="681.0" font-size="12" fill="#f08c00" font-weight="500">What IS visible: frozen prices when PubSub saturates at scale.  Kafka never has this problem.</text>
</svg>