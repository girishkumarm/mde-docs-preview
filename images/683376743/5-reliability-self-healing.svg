  <text x="507.4" y="37.16" font-size="22" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="bold" text-anchor="middle" fill="#2e7d32"><tspan x="507.4" dy="0">Reliability &amp; Self-Healing Architecture</tspan></text>
  <text x="523" y="60.14" font-size="13" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#616161"><tspan x="523" dy="0">Target: 99.99% uptime during market hours (max 2.6 min downtime/month)</tspan></text>
  <text x="190" y="109.36" font-size="12" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#fff"><tspan x="190" dy="0">Failure Scenario</tspan></text>
  <text x="480" y="109.36" font-size="12" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#fff"><tspan x="480" dy="0">Automatic Recovery</tspan></text>
  <text x="720" y="102.33" font-size="11" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#fff"><tspan x="720" dy="0">Recovery</tspan><tspan x="720" dy="13.75">Time</tspan></text>
  <text x="190" y="154.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="190" dy="0">Primary feed drops</tspan></text>
  <text x="480" y="147.8" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#1e1e1e"><tspan x="480" dy="0">Instant failover to hot standby</tspan><tspan x="480" dy="12.5">(both connections always active)</tspan></text>
  <text x="720" y="154.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="720" dy="0">0 sec</tspan></text>
  <text x="190" y="209.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="190" dy="0">Both feeds drop</tspan></text>
  <text x="480" y="202.8" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#1e1e1e"><tspan x="480" dy="0">Serve stale data from Redis replica</tspan><tspan x="480" dy="12.5">Auto-reconnect with exponential backoff</tspan></text>
  <text x="720" y="209.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="720" dy="0">5-30 sec</tspan></text>
  <text x="190" y="264.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="190" dy="0">Snapshot store corrupted</tspan></text>
  <text x="480" y="257.8" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#1e1e1e"><tspan x="480" dy="0">Failover to Redis replica — multi-AZ</tspan><tspan x="480" dy="12.5">recovers last known state automatically</tspan></text>
  <text x="720" y="264.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="720" dy="0">5 sec</tspan></text>
  <text x="190" y="319.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="190" dy="0">Kafka unavailable</tspan></text>
  <text x="480" y="312.8" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#1e1e1e"><tspan x="480" dy="0">Buffer ticks in ring buffer (1M capacity)</tspan><tspan x="480" dy="12.5">Flush on recovery. WS clients unaffected</tspan></text>
  <text x="720" y="319.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="720" dy="0">Transparent</tspan></text>
  <text x="190" y="374.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="190" dy="0">QuestDB down</tspan></text>
  <text x="480" y="367.8" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#1e1e1e"><tspan x="480" dy="0">Buffer candles in memory</tspan><tspan x="480" dy="12.5">Write on recovery. Snapshots unaffected</tspan></text>
  <text x="720" y="374.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="720" dy="0">Transparent</tspan></text>
  <text x="190" y="429.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="190" dy="0">Redis unavailable</tspan></text>
  <text x="480" y="422.8" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#1e1e1e"><tspan x="480" dy="0">Alerts served from PostgreSQL</tspan><tspan x="480" dy="12.5">(higher latency but functional)</tspan></text>
  <text x="720" y="429.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="720" dy="0">Transparent</tspan></text>
  <text x="190" y="484.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="190" dy="0">WebSocket pod crash</tspan></text>
  <text x="480" y="477.8" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#1e1e1e"><tspan x="480" dy="0">K8s restarts pod automatically</tspan><tspan x="480" dy="12.5">Clients reconnect via SDK</tspan></text>
  <text x="720" y="484.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="720" dy="0">10-15 sec</tspan></text>
  <text x="190" y="539.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="190" dy="0">Entire core pod crash</tspan></text>
  <text x="480" y="532.8" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#1e1e1e"><tspan x="480" dy="0">K8s starts new pod, reads from Redis</tspan><tspan x="480" dy="12.5">Feed reconnects automatically</tspan></text>
  <text x="720" y="539.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="720" dy="0">15-30 sec</tspan></text>
  <text x="190" y="594.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="190" dy="0">AWS AZ failure</tspan></text>
  <text x="480" y="587.8" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#1e1e1e"><tspan x="480" dy="0">Traffic shifts to other AZ</tspan><tspan x="480" dy="12.5">(multi-AZ deployment, 3 pods = 3 AZs)</tspan></text>
  <text x="720" y="594.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="720" dy="0">30-60 sec</tspan></text>
  <text x="190" y="649.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="190" dy="0">Bad deployment</tspan></text>
  <text x="480" y="642.8" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#1e1e1e"><tspan x="480" dy="0">Rolling update with health checks</tspan><tspan x="480" dy="12.5">Rollback if unhealthy — prevented</tspan></text>
  <text x="720" y="649.05" font-size="10" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="720" dy="0">0 sec</tspan></text>
  <text x="225.79999999999998" y="729.04" font-size="18" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="bold" text-anchor="middle" fill="#1565c0"><tspan x="225.79999999999998" dy="0">Graceful Degradation Levels</tspan></text>
  <text x="180" y="774.36" font-size="12" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="180" dy="0">Level 0: Normal</tspan></text>
  <text x="300" y="771.36" font-size="12" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="start" fill="#424242"><tspan x="300" dy="0">Everything works at full capacity</tspan></text>
  <text x="180" y="829.36" font-size="12" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#f57f17"><tspan x="180" dy="0">Level 1: Degraded</tspan></text>
  <text x="300" y="826.36" font-size="12" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="start" fill="#424242"><tspan x="300" dy="0">Candle writes delayed, alerts checked every 5 sec instead of per-tick</tspan></text>
  <text x="180" y="884.36" font-size="12" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#e65100"><tspan x="180" dy="0">Level 2: Emergency</tspan></text>
  <text x="300" y="881.36" font-size="12" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="start" fill="#424242"><tspan x="300" dy="0">WebSocket throttled to 1/5sec, alerts paused, only snapshot + Kafka continue</tspan></text>
  <text x="180" y="939.36" font-size="12" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="180" dy="0">Level 3: Critical</tspan></text>
  <text x="300" y="936.36" font-size="12" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="start" fill="#424242"><tspan x="300" dy="0">WebSocket disconnected. Only Trade Engine and Portfolio Engine get ticks via Kafka</tspan></text>
</svg>
