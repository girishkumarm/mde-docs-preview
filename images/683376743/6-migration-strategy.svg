  <text x="587.5" y="209.63000000000002" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="587.5" dy="0">New: 5%</tspan><tspan x="587.5" dy="14.3">New engine serves</tspan><tspan x="587.5" dy="14.3">5% real traffic</tspan></text>
  <text x="515" y="285.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#424242"><tspan x="515" dy="0">Activities</tspan></text>
  <text x="515" y="320.33" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#424242"><tspan x="515" dy="0">- 5% traffic to new engine</tspan><tspan x="515" dy="14.3">- 95% traffic to old system</tspan><tspan x="515" dy="14.3">- Automated rollback trigger</tspan><tspan x="515" dy="14.3">- Error rate monitored real-time</tspan><tspan x="515" dy="14.3">- Latency SLO: P99 &lt; 50ms</tspan></text>
