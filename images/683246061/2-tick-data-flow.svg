  <text x="350" y="99.36" font-size="12" font-family="'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-weight="normal" text-anchor="middle" fill="#1e1e1e"><tspan x="350" dy="0">Exchange broadcasts tick</tspan><tspan x="350" dy="15">&quot;RELIANCE LTP 2450.30</tspan><tspan x="350" dy="15">Vol 5,200,000&quot;</tspan></text>
