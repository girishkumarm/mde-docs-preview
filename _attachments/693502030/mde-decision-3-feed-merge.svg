<text x="150" y="44.0" font-size="24" fill="#1e1e1e" font-weight="500">Decision 3: Merge NSE + Omnenest into Single Pipeline</text>
<text x="150" y="67.0" font-size="12" fill="#c92a2a" font-weight="500">Problem: 85/15 user split meant 15% saw slower prices. UDP gaps had no automatic recovery.</text>
<text x="50" y="118.0" font-size="18" fill="#c92a2a" font-weight="500">BEFORE — Split by User Session</text>
<text x="66" y="163.0" font-size="11" fill="#e67700" font-weight="500">NSE Direct</text>
<text x="66" y="176.75" font-size="11" fill="#e67700" font-weight="500">~2K TPS (fast)</text>
<text x="66" y="190.5" font-size="11" fill="#e67700" font-weight="500">Serves 85% of users</text>
<text x="336" y="163.0" font-size="11" fill="#e8590c" font-weight="500">Omnenest</text>
<text x="336" y="176.75" font-size="11" fill="#e8590c" font-weight="500">~2K TPS (3-8ms slower)</text>
<text x="336" y="190.5" font-size="11" fill="#e8590c" font-weight="500">Serves 15% of users</text>
<text x="66" y="269.0" font-size="11" fill="#7048e8" font-weight="500">Feed Handler A</text>
<text x="66" y="282.75" font-size="11" fill="#7048e8" font-weight="500">(NSE feed)</text>
<text x="336" y="269.0" font-size="11" fill="#7048e8" font-weight="500">Feed Handler B</text>
<text x="336" y="282.75" font-size="11" fill="#7048e8" font-weight="500">(Omnenest feed)</text>
<text x="66" y="361.0" font-size="11" fill="#2f9e44" font-weight="500">85% users</text>
<text x="66" y="374.75" font-size="11" fill="#2f9e44" font-weight="500">→ FAST prices</text>
<text x="66" y="388.5" font-size="11" fill="#2f9e44" font-weight="500">(NSE speed)</text>
<text x="336" y="361.0" font-size="11" fill="#c92a2a" font-weight="500">15% users</text>
<text x="336" y="374.75" font-size="11" fill="#c92a2a" font-weight="500">→ SLOWER prices</text>
<text x="336" y="388.5" font-size="11" fill="#c92a2a" font-weight="500">(Omnenest speed)</text>
<text x="66" y="454.0" font-size="11" fill="#c92a2a" font-weight="500">PROBLEMS:</text>
<text x="66" y="467.75" font-size="11" fill="#c92a2a" font-weight="500">• 15% users see prices 3-8 ms later</text>
<text x="66" y="481.5" font-size="11" fill="#c92a2a" font-weight="500">• NSE UDP packet drop → data LOST forever</text>
<text x="66" y="495.25" font-size="11" fill="#c92a2a" font-weight="500">  (no automatic recovery from Omnenest)</text>
<text x="66" y="509.0" font-size="11" fill="#c92a2a" font-weight="500">• Failover requires rerouting users mid-session</text>
<text x="780" y="118.0" font-size="18" fill="#2f9e44" font-weight="500">AFTER — Merge Both (Best-of-Both)</text>
<text x="796" y="163.0" font-size="11" fill="#e67700" font-weight="500">NSE Direct</text>
<text x="796" y="176.75" font-size="11" fill="#e67700" font-weight="500">~2K TPS</text>
<text x="1066" y="163.0" font-size="11" fill="#e8590c" font-weight="500">Omnenest</text>
<text x="1066" y="176.75" font-size="11" fill="#e8590c" font-weight="500">~2K TPS</text>
<text x="796" y="278.0" font-size="12" fill="#7048e8" font-weight="500">SINGLE Feed Handler</text>
<text x="796" y="293.0" font-size="12" fill="#7048e8" font-weight="500"></text>
<text x="796" y="308.0" font-size="12" fill="#7048e8" font-weight="500">Dedup by (instrument, timestamp)</text>
<text x="796" y="323.0" font-size="12" fill="#7048e8" font-weight="500">Whichever source arrives first WINS</text>
<text x="796" y="338.0" font-size="12" fill="#7048e8" font-weight="500">Second arrival = duplicate → drop</text>
<text x="796" y="353.0" font-size="12" fill="#7048e8" font-weight="500">~4K TPS in → ~2K TPS out (after dedup)</text>
<text x="796" y="429.0" font-size="13" fill="#2f9e44" font-weight="500">ALL users</text>
<text x="796" y="445.25" font-size="13" fill="#2f9e44" font-weight="500">→ Best-of-both prices</text>
<text x="796" y="461.5" font-size="13" fill="#2f9e44" font-weight="500">→ Fastest available + most complete</text>
<text x="796" y="529.0" font-size="11" fill="#2f9e44" font-weight="500">BENEFITS:</text>
<text x="796" y="542.75" font-size="11" fill="#2f9e44" font-weight="500">• Every user gets fastest available price</text>
<text x="796" y="556.5" font-size="11" fill="#2f9e44" font-weight="500">• NSE drops packet → Omnenest fills gap (automatic)</text>
<text x="796" y="570.25" font-size="11" fill="#2f9e44" font-weight="500">• Omnenest continuously validated (every tick compared)</text>
<text x="796" y="584.0" font-size="11" fill="#2f9e44" font-weight="500">• NSE dies → zero-switchover failover</text>
<text x="796" y="597.75" font-size="11" fill="#2f9e44" font-weight="500">• No user is ever on the 'slower' path</text>
<text x="66" y="673.0" font-size="11" fill="#f08c00" font-weight="500">EXAMPLE — RELIANCE Tick Flow</text>
<text x="66" y="686.75" font-size="11" fill="#f08c00" font-weight="500"></text>
<text x="66" y="700.5" font-size="11" fill="#f08c00" font-weight="500">09:15:00.001 — NSE delivers @ ₹2,450 → Feed Handler processes (first arrival wins)</text>
<text x="66" y="714.25" font-size="11" fill="#f08c00" font-weight="500">09:15:00.005 — Omnenest delivers same tick → skipped (duplicate by instrument+timestamp)</text>
<text x="66" y="728.0" font-size="11" fill="#f08c00" font-weight="500">09:15:00.010 — NSE misses the next tick (UDP packet loss) → Omnenest delivers 4 ms later → Feed Handler processes it (gap auto-filled, no data loss!)</text>
</svg>