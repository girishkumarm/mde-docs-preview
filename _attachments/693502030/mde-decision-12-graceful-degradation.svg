<text x="626.0" y="54.0" font-size="20" fill="#ffffff" font-weight="600" xml:space="preserve">Decision 12: Zero-Error UX (Graceful Degradation)</text>
<text x="639.0" y="74.0" font-size="13" fill="#e7f5ff" font-weight="400" xml:space="preserve">Users should NEVER see an error. If a component fails, degrade silently.</text>
<text x="577.5" y="145.54" font-size="14" fill="#1e1e1e" font-weight="400" xml:space="preserve">Problem: Users should NEVER see an error. If a component fails, degrade silently.</text>
<text x="595.5" y="211.76" font-size="16" fill="#0b3b6f" font-weight="600" xml:space="preserve">User Request Flow — Charts API example (4-layer fallback waterfall)</text>
<text x="40" y="273.0" font-size="15" fill="#2f9e44" font-weight="600" xml:space="preserve">LAYER 1 — HAPPY PATH</text>
<text x="40" y="299.0" font-size="13" fill="#1e1e1e" font-weight="400" xml:space="preserve">Redis Cluster 2 live candles</text>
<text x="40" y="321.0" font-size="13" fill="#1e1e1e" font-weight="400" xml:space="preserve">Return within 10 ms</text>
<text x="582" y="360.0" font-size="11" fill="#495057" font-weight="400" xml:space="preserve">on failure</text>
<text x="40" y="400.0" font-size="15" fill="#e67700" font-weight="600" xml:space="preserve">LAYER 2 — FALLBACK 1</text>
<text x="40" y="426.0" font-size="13" fill="#1e1e1e" font-weight="400" xml:space="preserve">TimescaleDB query</text>
<text x="40" y="448.0" font-size="13" fill="#1e1e1e" font-weight="400" xml:space="preserve">Return within 50 ms, flag stale=false</text>
<text x="582" y="487.0" font-size="11" fill="#495057" font-weight="400" xml:space="preserve">on failure</text>
<text x="40" y="527.0" font-size="15" fill="#d9480f" font-weight="600" xml:space="preserve">LAYER 3 — FALLBACK 2</text>
<text x="40" y="553.0" font-size="13" fill="#1e1e1e" font-weight="400" xml:space="preserve">Previous day candles from cold cache</text>
<text x="40" y="575.0" font-size="13" fill="#1e1e1e" font-weight="400" xml:space="preserve">Return within 100 ms, flag stale=true with timestamp</text>
<text x="582" y="614.0" font-size="11" fill="#495057" font-weight="400" xml:space="preserve">on failure</text>
<text x="40" y="654.0" font-size="15" fill="#495057" font-weight="600" xml:space="preserve">LAYER 4 — FINAL (never fails)</text>
<text x="40" y="680.0" font-size="13" fill="#1e1e1e" font-weight="400" xml:space="preserve">Empty data with skeleton UI</text>
<text x="40" y="702.0" font-size="13" fill="#1e1e1e" font-weight="400" xml:space="preserve">Return HTTP 200 with data=null, message='Updating'</text>
<text x="1406.0" y="270.9" font-size="15" fill="#1e1e1e" font-weight="600" xml:space="preserve">USER EXPERIENCE</text>
<text x="1166" y="320.0" font-size="13" fill="#2f9e44" font-weight="400" xml:space="preserve">Layer 1 — normal</text>
<text x="1166" y="343.0" font-size="12" fill="#1e1e1e" font-weight="400" xml:space="preserve">Chart renders normally — live updates</text>
<text x="1166" y="410.0" font-size="13" fill="#e67700" font-weight="400" xml:space="preserve">Layer 2 — slight delay</text>
<text x="1166" y="433.0" font-size="12" fill="#1e1e1e" font-weight="400" xml:space="preserve">Chart renders with tiny 'updating' indicator</text>
<text x="1166" y="500.0" font-size="13" fill="#d9480f" font-weight="400" xml:space="preserve">Layer 3 — stale</text>
<text x="1166" y="523.0" font-size="12" fill="#1e1e1e" font-weight="400" xml:space="preserve">Chart shows with '5 min old' tag in amber</text>
<text x="1166" y="590.0" font-size="13" fill="#495057" font-weight="400" xml:space="preserve">Layer 4 — waiting</text>
<text x="1166" y="613.0" font-size="12" fill="#1e1e1e" font-weight="400" xml:space="preserve">Skeleton chart animation, no error popup</text>
<text x="803.5" y="775.0" font-size="16" fill="#0b3b6f" font-weight="600" xml:space="preserve">PER-API FALLBACK MATRIX</text>
<text x="89.0" y="812.0" font-size="13" fill="#212529" font-weight="400" xml:space="preserve">API</text>
<text x="318.5" y="812.0" font-size="13" fill="#212529" font-weight="400" xml:space="preserve">LAYER 1 — Primary</text>
<text x="712.5" y="812.0" font-size="13" fill="#212529" font-weight="400" xml:space="preserve">LAYER 2 — Fallback 1</text>
<text x="1117.5" y="812.0" font-size="13" fill="#212529" font-weight="400" xml:space="preserve">LAYER 3 — Fallback 2</text>
<text x="1541.0" y="812.0" font-size="13" fill="#212529" font-weight="400" xml:space="preserve">LAYER 4 — Final</text>
<text x="79.5" y="857.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Charts</text>
<text x="330.5" y="857.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Redis Cluster 2</text>
<text x="749.5" y="857.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">TimescaleDB</text>
<text x="1126.5" y="857.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Cold cache prev-day</text>
<text x="1542.0" y="857.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Empty + skeleton</text>
<text x="90.0" y="901.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">FNO</text>
<text x="330.5" y="901.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Redis Cluster 2</text>
<text x="725.0" y="901.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">TimescaleDB + calc</text>
<text x="1147.5" y="901.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Last known OI</text>
<text x="1542.0" y="901.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Empty + skeleton</text>
<text x="79.5" y="945.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Movers</text>
<text x="313.0" y="945.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Redis Cluster 2 scan</text>
<text x="728.5" y="945.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">TimescaleDB query</text>
<text x="1147.5" y="945.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Last snapshot</text>
<text x="1542.0" y="945.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Empty + skeleton</text>
<text x="79.5" y="989.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">WS LTP</text>
<text x="316.5" y="989.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Redis Cluster 1 sub</text>
<text x="718.0" y="989.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Redis Cluster 2 poll</text>
<text x="1144.0" y="989.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Last known LTP</text>
<text x="1535.0" y="989.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Disconnect + retry</text>
<text x="41.0" y="1033.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Instrument Search</text>
<text x="337.5" y="1033.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">ES index live</text>
<text x="753.0" y="1033.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">ES replica</text>
<text x="1126.5" y="1033.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Static scrip-master</text>
<text x="1535.0" y="1033.0" font-size="12" fill="#212529" font-weight="400" xml:space="preserve">Client-side search</text>
<text x="573.5" y="1095.58" font-size="14" fill="#1e1e1e" font-weight="400" xml:space="preserve">Key: Every API returns HTTP 200. Errors are LOGGED (to Incident Manager) but NEVER</text>
<text x="634.0" y="1113.5" font-size="14" fill="#1e1e1e" font-weight="400" xml:space="preserve">surfaced to the client. Frontend treats null data as loading state.</text>
