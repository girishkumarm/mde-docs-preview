  <text x="715" y="38.41" font-size="22" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="bold" text-anchor="middle" fill="#1565c0"><tspan x="715" dy="0">QuestDB Data Pipeline — Full Lifecycle</tspan></text>
  <text x="365" y="88.48" font-size="16" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#ffffff"><tspan x="365" dy="0">1. Write Pipeline</tspan></text>
  <text x="195" y="132.89" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#0d47a1"><tspan x="195" dy="0">Price Engine</tspan><tspan x="195" dy="16.25">(pml-core-streamer)</tspan></text>
  <text x="525" y="133.36" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#0d47a1"><tspan x="525" dy="0">ILP Batch Writer</tspan><tspan x="525" dy="15">(InfluxDB Line Protocol over TCP)</tspan></text>
  <text x="195" y="197.705" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#0d47a1"><tspan x="195" dy="0">Batch: 10,000 rows | Flush: 100ms</tspan></text>
  <text x="525" y="190.83" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#0d47a1"><tspan x="525" dy="0">WAL (Write-Ahead Log) for durability</tspan><tspan x="525" dy="13.75">Dedup on timestamp + instrument_id</tspan></text>
  <text x="365" y="244.015" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#0d47a1"><tspan x="365" dy="0">QuestDB Tables (all partitioned by DAY)</tspan></text>
  <text x="115" y="285.83" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1a237e"><tspan x="115" dy="0">ticks</tspan><tspan x="115" dy="13.75">(raw data)</tspan></text>
  <text x="250" y="292.705" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1a237e"><tspan x="250" dy="0">candles_1m</tspan></text>
  <text x="380" y="292.705" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1a237e"><tspan x="380" dy="0">candles_5m</tspan></text>
  <text x="510" y="292.705" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1a237e"><tspan x="510" dy="0">candles_15m</tspan></text>
  <text x="635" y="285.83" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1a237e"><tspan x="635" dy="0">candles_1h</tspan><tspan x="635" dy="13.75">candles_1d</tspan></text>
  <text x="1065" y="88.48" font-size="16" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#ffffff"><tspan x="1065" dy="0">2. Candle Generation</tspan></text>
  <text x="905" y="130.39" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="905" dy="0">Temporal Workflow</tspan><tspan x="905" dy="16.25">triggers candle generation</tspan></text>
  <text x="1230" y="130.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="1230" dy="0">Materialized from raw ticks</tspan><tspan x="1230" dy="15">NOT derived from other candles</tspan></text>
  <text x="1065" y="185.16000000000003" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="1065" dy="0">SELECT first(price), max(price),</tspan><tspan x="1065" dy="15.600000000000001">       min(price), last(price), sum(volume)</tspan><tspan x="1065" dy="15.600000000000001">FROM ticks</tspan><tspan x="1065" dy="15.600000000000001">SAMPLE BY 1m</tspan></text>
  <text x="825" y="275.705" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="825" dy="0">1m: every minute</tspan></text>
  <text x="985" y="268.83" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="985" dy="0">5m/15m/1h:</tspan><tspan x="985" dy="13.75">on boundary</tspan></text>
  <text x="1145" y="268.83" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="1145" dy="0">1d: end-of-day</tspan><tspan x="1145" dy="13.75">(EOD)</tspan></text>
  <text x="1310" y="276.17" font-size="14" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#ffffff"><tspan x="1310" dy="0">Schedules</tspan></text>
  <text x="715" y="418.48" font-size="16" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#ffffff"><tspan x="715" dy="0">3. Query Patterns</tspan></text>
  <text x="205" y="470.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#4a148c"><tspan x="205" dy="0">Chart Data</tspan><tspan x="205" dy="15">Candles for instrument + timeframe</tspan><tspan x="205" dy="15">Latency: &lt; 5ms</tspan></text>
  <text x="540" y="470.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#4a148c"><tspan x="540" dy="0">Live LTP</tspan><tspan x="540" dy="15">Redis primary, QuestDB fallback</tspan><tspan x="540" dy="15">Latency: &lt; 1ms (Redis)</tspan></text>
  <text x="875" y="470.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#4a148c"><tspan x="875" dy="0">Greeks History</tspan><tspan x="875" dy="15">Time-series for an option</tspan><tspan x="875" dy="15">Latency: &lt; 10ms</tspan></text>
  <text x="1200" y="470.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#4a148c"><tspan x="1200" dy="0">OHLC Aggregation</tspan><tspan x="1200" dy="15">Custom timeframe aggregation</tspan><tspan x="1200" dy="15">Latency: &lt; 50ms</tspan></text>
  <text x="715" y="552.705" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#4a148c"><tspan x="715" dy="0">All queries indexed on instrument_id  |  Partitioned scan on timestamp  |  Connection pool: HikariCP (max 20)</tspan></text>
  <text x="365" y="618.48" font-size="16" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#ffffff"><tspan x="365" dy="0">4. Retention &amp; Archival</tspan></text>
  <text x="150" y="670.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#bf360c"><tspan x="150" dy="0">HOT (7 days)</tspan><tspan x="150" dy="15">SSD, full resolution</tspan><tspan x="150" dy="15">All tables</tspan></text>
  <text x="365" y="670.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#bf360c"><tspan x="365" dy="0">WARM (90 days)</tspan><tspan x="365" dy="15">SSD, 1m candles only</tspan><tspan x="365" dy="15">Ticks dropped</tspan></text>
  <text x="590" y="670.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#f57f17"><tspan x="590" dy="0">COLD (permanent)</tspan><tspan x="590" dy="15">S3 Parquet files</tspan><tspan x="590" dy="15">Queryable via Trino/Athena</tspan></text>
  <text x="365" y="755.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#bf360c"><tspan x="365" dy="0">Temporal Workflow: daily archival job moves data between tiers</tspan><tspan x="365" dy="15">Drop ticks &gt; 7d  |  Archive candles &gt; 90d to S3 Parquet</tspan></text>
  <text x="365" y="815.205" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#bf360c"><tspan x="365" dy="0">S3 lifecycle: Standard -&gt; IA (30d) -&gt; Glacier (365d)  |  Athena for ad-hoc historical queries</tspan></text>
  <text x="1065" y="618.48" font-size="16" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#ffffff"><tspan x="1065" dy="0">5. Query Consumers</tspan></text>
  <text x="902.5" y="665.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#004d40"><tspan x="902.5" dy="0">Mobile App</tspan><tspan x="902.5" dy="15">Chart data via REST API</tspan><tspan x="902.5" dy="15">/api/v1/charts/{instrument}</tspan></text>
  <text x="1222.5" y="665.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#004d40"><tspan x="1222.5" dy="0">Web App</tspan><tspan x="1222.5" dy="15">Live data via WebSocket</tspan><tspan x="1222.5" dy="15">Real-time LTP + chart updates</tspan></text>
  <text x="902.5" y="750.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#004d40"><tspan x="902.5" dy="0">Analytics / BI</tspan><tspan x="902.5" dy="15">Batch queries via Trino</tspan><tspan x="902.5" dy="15">S3 Parquet + QuestDB federation</tspan></text>
  <text x="1222.5" y="750.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#004d40"><tspan x="1222.5" dy="0">Temporal Workflows</tspan><tspan x="1222.5" dy="15">EOD reconciliation</tspan><tspan x="1222.5" dy="15">Bhav copy vs last tick validation</tspan></text>
  <text x="1065" y="833.205" font-size="11" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#004d40"><tspan x="1065" dy="0">All consumers use connection pooling (HikariCP)  |  Read replicas for Analytics/BI  |  Redis cache for LTP</tspan></text>
</svg>
