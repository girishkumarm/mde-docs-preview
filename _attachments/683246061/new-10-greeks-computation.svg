  <text x="160" y="87.325" font-size="15" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#2e7d32"><tspan x="160" dy="0">1. Input Data</tspan></text>
