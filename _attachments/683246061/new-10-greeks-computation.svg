  <text x="947" y="454.36" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#311b92"><tspan x="947" dy="0">Write</tspan><tspan x="947" dy="15">QuestDB</tspan></text>
