  <text x="237" y="461.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#311b92"><tspan x="237" dy="0">Check cache</tspan></text>
  <text x="379" y="461.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#311b92"><tspan x="379" dy="0">Compute IV</tspan></text>
  <text x="521" y="454.36" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#311b92"><tspan x="521" dy="0">Compute all</tspan><tspan x="521" dy="15">5 Greeks</tspan></text>
  <text x="663" y="454.36" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#311b92"><tspan x="663" dy="0">Update</tspan><tspan x="663" dy="15">Redis</tspan></text>
