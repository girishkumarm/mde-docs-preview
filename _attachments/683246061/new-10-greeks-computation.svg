  <text x="157.5" y="603.42" font-size="14" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#e65100"><tspan x="157.5" dy="0">Latency</tspan><tspan x="157.5" dy="17.5">&lt;2ms per option tick</tspan></text>
  <text x="417.5" y="603.42" font-size="14" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#e65100"><tspan x="417.5" dy="0">Throughput</tspan><tspan x="417.5" dy="17.5">50,000 options/sec</tspan></text>
