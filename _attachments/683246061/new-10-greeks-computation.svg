  <text x="937.5" y="603.42" font-size="14" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#e65100"><tspan x="937.5" dy="0">IV convergence</tspan><tspan x="937.5" dy="17.5">99.9%</tspan></text>
