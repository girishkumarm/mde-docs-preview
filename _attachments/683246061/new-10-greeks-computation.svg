  <text x="160" y="171.515" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="160" dy="0">Underlying price (spot/futures)</tspan></text>
  <text x="160" y="213.515" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="160" dy="0">Strike price</tspan></text>
  <text x="160" y="255.515" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="160" dy="0">Expiry date</tspan></text>
  <text x="160" y="297.515" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="160" dy="0">Risk-free rate</tspan></text>
  <text x="160" y="339.515" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1b5e20"><tspan x="160" dy="0">Dividend yield</tspan></text>
  <text x="490" y="87.325" font-size="15" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1565c0"><tspan x="490" dy="0">2. Implied Volatility Solver</tspan></text>
  <text x="490" y="129.515" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1a237e"><tspan x="490" dy="0">Newton-Raphson iteration</tspan></text>
  <text x="490" y="169.89" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1a237e"><tspan x="490" dy="0">Market Price vs Theoretical</tspan><tspan x="490" dy="16.25">Price convergence</tspan></text>
  <text x="490" y="226.515" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1a237e"><tspan x="490" dy="0">Tolerance: 0.0001</tspan></text>
  <text x="490" y="268.515" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1a237e"><tspan x="490" dy="0">Max iterations: 100</tspan></text>
  <text x="490" y="310.515" font-size="13" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#1a237e"><tspan x="490" dy="0">Fallback: bisection method</tspan></text>
  <text x="885" y="87.325" font-size="15" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#c62828"><tspan x="885" dy="0">3. Greeks Formulas (Black-Scholes)</tspan></text>
  <text x="885" y="126.36" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#4e342e"><tspan x="885" dy="0">Delta = N(d1) for calls</tspan><tspan x="885" dy="15">Delta = N(d1)-1 for puts</tspan></text>
  <text x="885" y="183.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#4e342e"><tspan x="885" dy="0">Gamma = phi(d1) / (S * sigma * sqrt(T))</tspan></text>
  <text x="885" y="226.36" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#4e342e"><tspan x="885" dy="0">Theta = -(S*phi(d1)*sigma)/(2*sqrt(T))</tspan><tspan x="885" dy="15">  - r*K*exp(-rT)*N(d2)</tspan></text>
  <text x="885" y="283.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#4e342e"><tspan x="885" dy="0">Vega = S * phi(d1) * sqrt(T)</tspan></text>
  <text x="885" y="328.86" font-size="12" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#4e342e"><tspan x="885" dy="0">Rho = K * T * exp(-rT) * N(d2)</tspan></text>
  <text x="555" y="407.325" font-size="15" font-family="'Virgil', 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="normal" text-anchor="middle" fill="#6a1b9a"><tspan x="555" dy="0">4. Computation Flow</tspan></text>
